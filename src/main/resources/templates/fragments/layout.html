<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:fragment="page(title, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:replace="${title}">FutApp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0a0e1a;color:#e0e6f0;min-height:100vh}
    nav{background:linear-gradient(135deg,#1a2744,#0d1f3c);padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:2px solid #2a9d8f}
    nav a{color:#90caf9;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:0.88rem;transition:background 0.2s}
    nav a:hover{background:#2a9d8f;color:#fff}
    nav .brand{color:#2a9d8f;font-weight:700;font-size:1.1rem;margin-right:12px}
    .container{max-width:1100px;margin:32px auto;padding:0 20px}
    h1{font-size:1.6rem;margin-bottom:22px;color:#90caf9}
    .btn{display:inline-block;padding:8px 18px;border-radius:7px;text-decoration:none;font-size:0.88rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
    .btn-primary{background:#2a9d8f;color:#fff}.btn-primary:hover{background:#21867a}
    .btn-warning{background:#e9c46a;color:#1a1a1a}.btn-warning:hover{background:#d4b455}
    .btn-danger{background:#e76f51;color:#fff}.btn-danger:hover{background:#c95a3d}
    .btn-secondary{background:#3a4a6b;color:#cdd8f0}.btn-secondary:hover{background:#4a5a7b}
    .btn-sm{padding:5px 12px;font-size:0.8rem}
    table{width:100%;border-collapse:collapse;background:#111827;border-radius:10px;overflow:hidden;margin-top:16px}
    th{background:#1a2744;color:#90caf9;padding:12px 16px;text-align:left;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em}
    td{padding:11px 16px;border-bottom:1px solid #1e2d4a;font-size:0.9rem}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#151f35}
    .form-card{background:#111827;border-radius:12px;padding:28px;max-width:600px}
    .form-group{margin-bottom:18px}
    label{display:block;margin-bottom:6px;color:#90caf9;font-size:0.85rem;font-weight:600}
    input,select{width:100%;padding:9px 13px;background:#1a2744;border:1px solid #2a3a5c;border-radius:7px;color:#e0e6f0;font-size:0.9rem}
    input:focus,select:focus{outline:none;border-color:#2a9d8f;background:#1e2f50}
    .actions{display:flex;gap:8px;align-items:center}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:0.75rem;font-weight:600}
    .badge-teal{background:#14534c;color:#2dd4bf}
    .badge-blue{background:#1e3a5f;color:#60a5fa}
    .badge-orange{background:#7c2d12;color:#fb923c}
    .empty-state{text-align:center;padding:48px;color:#4a5a7b}
    .empty-state svg{margin-bottom:12px;opacity:0.4}
  </style>
</head>
<body>
<nav>
  <span class="brand">⚽ FutApp</span>
  <a th:href="@{/}">Inicio</a>
  <a th:href="@{/federaciones}">Federaciones</a>
  <a th:href="@{/equipos}">Equipos</a>
  <a th:href="@{/campeonatos}">Campeonatos</a>
  <a th:href="@{/jugadores}">Jugadores</a>
  <a th:href="@{/entrenadores}">Entrenadores</a>
  <a th:href="@{/arbitros}">Árbitros</a>
  <a th:href="@{/partidos}">Partidos</a>
</nav>
<div class="container">
  <th:block th:replace="${content}"/>
</div>
</body>
</html>
