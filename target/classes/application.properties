spring.application.name=futappweb
server.port=8080

# Conexion Oracle Autonomous Database con Wallet
# IMPORTANTE: Cambie la ruta del wallet y la contrasena antes de correr
spring.datasource.url=jdbc:oracle:thin:@futapp_high?TNS_ADMIN=C:/wallet/futapp
spring.datasource.username=ADMIN
spring.datasource.password=CambiarContraseña
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
